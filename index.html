    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; min-height: 100vh; }

    body {
      background-color: #E3DFDC;
      font-family: 'BrilliantCutPro', serif;
      color: #BFAA78;
      min-height: 100vh;
    }

    /* ── HEADER fijo arriba ── */
    .site-header {
      position: fixed;
      top: 36px;
      left: 0; right: 0;
      text-align: center;
      z-index: 10;
    }
    .site-name {
      font-weight: 500;
      font-size: 9px;
      letter-spacing: 0.10em;
      color: #BFAA78;
      text-transform: uppercase;
    }

    /* ── SVG al 40% ── */
    .stamp-wrap {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .stamp-img {
      width: 220px;
      height: auto;
      display: block;
    }

    /* ── NAV al 68% ── */
    .nav-wrap {
      position: fixed;
      top: 68%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      width: 100%;
    }
    .nav-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0 40px;
